<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CITableCleaner</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

<!-- ── Pyodide init overlay ──────────────────────────────────────────── -->
<div id="init-overlay">
  <div class="spinner"></div>
  <span id="init-msg">Loading Python runtime… (first visit ~5 s)</span>
  <progress id="init-progress" max="100" value="0"></progress>
</div>

<!-- ── Size warning / feedback toast ────────────────────────────────── -->
<div id="toast" class="hidden"></div>

<!-- ══════════════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- ── Top toolbar ─────────────────────────────────────────────── -->
  <div id="toolbar">
    <button id="load-btn" disabled>Load file</button>
    <!-- hidden real file input -->
    <input id="file-input" type="file"
           accept=".csv,.tsv,.txt,.xlsx"
           aria-labelledby="load-btn" />
    <span id="file-label">No file loaded &nbsp;(or drag &amp; drop a CSV / Excel file here)</span>
    <div id="progress-wrap">
      <progress id="load-progress" max="100" value="0"></progress>
    </div>
  </div>

  <!-- ── Central ─────────────────────────────────────────────────── -->
  <div id="central">

    <!-- Left pane: well plate -->
    <div id="left-pane">
      <div class="section-title">Well Selection</div>
      <canvas id="plate-canvas"></canvas>
      <div id="plate-format-label"></div>
      <div class="btn-row">
        <button id="sel-all-wells">Select All</button>
        <button id="desel-all-wells">Deselect All</button>
      </div>
    </div>

    <!-- Right pane: columns -->
    <div id="right-pane">
      <div class="section-title">Column Selection</div>
      <span id="sn-info">SeriesName &nbsp;(always included)</span>
      <div id="col-list"></div>
      <div class="btn-row">
        <button id="sel-all-cols">Select All</button>
        <button id="desel-all-cols">Deselect All</button>
      </div>
    </div>

  </div><!-- #central -->

  <!-- ── Bottom bar ──────────────────────────────────────────────── -->
  <div id="bottom-bar">

    <span id="cells-row-sampling">
    <label class="bar-label" for="row-pct">Row sampling:</label>
    <input id="row-pct" type="number" min="1" max="100" value="100"
           title="Percentage of rows to export. 10 % → every 10th row." />
    <span class="bar-label">%</span>
    <div class="vline"></div>
    </span>

    <span id="cells-split">
    <label class="bar-label" for="split-col">Split by:</label>
    <select id="split-col" disabled>
      <option value="(none)">(none)</option>
    </select>

    <label class="bar-label" for="split-threshold">≤</label>
    <input id="split-threshold" type="number" step="any" value="0"
           disabled
           title="Threshold — rows ≤ this value go to file 1, rows > this value go to file 2." />
    </span>

    <span id="cells-aggregate">
    <div class="vline"></div>
    <label id="aggregate-wells-label" class="bar-label" for="aggregate-wells"
           title="When checked, export aggregated wells tables (one row per well) instead of raw split cells tables. Only available for cells tables when a split column is selected.">As wells table:</label>
    <input id="aggregate-wells" type="checkbox" disabled
           title="Export aggregated wells tables (one row per well) instead of raw split cells tables." />
    </span>

    <div class="vline"></div>

    <button id="export-btn" disabled>Export CSV</button>

    <div class="spacer"></div>

    <a id="header-csv-link" class="bar-icon-link hidden"
       title="Download column descriptions"
       download>📋 <span id="header-csv-name"></span></a>

    <a id="github-link" class="bar-icon-link"
       href="https://github.com/Cellular-Imaging-Amsterdam-UMC/citablecleaner"
       target="_blank" rel="noopener noreferrer"
       title="View on GitHub">
      <svg height="18" width="18" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
          -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
          .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
          -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27c.68 0
          1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
          1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01
          1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>

  </div><!-- #bottom-bar -->

  <!-- ── Status bar ──────────────────────────────────────────────── -->
  <div id="status-bar">
    <span id="status-rows">Rows: —</span>
    <span id="status-wells">Wells selected: 0</span>
    <span id="status-cols">Columns selected: 0</span>
    <span id="status-output"></span>
  </div>

</div><!-- #app -->

<!-- coi-serviceworker adds COOP/COEP headers via a service worker so that
     SharedArrayBuffer (required by Pyodide) is available on hosts like
     GitHub Pages that don't send those headers natively. Safari 15+ supports
     service workers; on the very first load the page reloads once to activate. -->
<script src="coi-serviceworker.min.js"></script>
<script type="module" src="app.js?v=2"></script>
</body>
</html>
